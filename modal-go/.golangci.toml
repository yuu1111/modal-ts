version = "2"

[linters]
enable = [
  "errcheck",
  "govet",
  "ineffassign",
  "sloglint",
  "staticcheck",
  "unused",
  "usetesting",
]

[linters.settings.staticcheck]
checks = ["all"]

[linters.settings.sloglint]
context = "all"

[formatters]
enable = ["gofmt", "goimports"]

[linters.exclusions]
rules = [
  { path = "internal", linters = [
    "staticcheck",
  ], text = "SA1019:" },
  { path = "examples", linters = [
    "staticcheck",
  ], text = "SA1019:" },
  { path = "test", linters = [
    "staticcheck",
  ], text = "SA1019:" },
  { path = ".go", linters = [
    "staticcheck",
  ], text = "ST1000:" },
]
