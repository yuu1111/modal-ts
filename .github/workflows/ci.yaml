name: CI

permissions:
  id-token: write

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    name: Build, lint, and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: aws-actions/configure-aws-credentials@be2e7ad815e27b890489a89ce2717b0f9e26b56e # v4
        with:
          role-to-assume: arn:aws:iam::459781239556:role/libmodal-ci-cd-role-62a288d
          aws-region: us-east-1

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: bun run format:check

      - run: bun run typecheck

      - run: bun run lint

      - run: bun run build

      - name: Deploy test support
        run: bun test-support/setup.ts
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
          MODAL_ENVIRONMENT: libmodal

      - run: bun test
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
          MODAL_ENVIRONMENT: libmodal
