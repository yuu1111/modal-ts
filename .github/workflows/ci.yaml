name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    name: Typecheck, lint, and build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - run: bun run typecheck

      - run: bunx biome ci .

      - run: bun run build
